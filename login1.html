<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aamar Land - Authentication Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

  <div id="main-background" class="min-h-screen bg-cover bg-center flex items-center justify-center p-4 relative bg-[#F8F6F0]">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>

    <div id="login-card"
      class="bg-white rounded-[24px] shadow-2xl w-full max-w-[440px] px-8 py-10 sm:px-12 sm:py-12 relative z-10 transition-all duration-300">

      <div class="flex flex-col items-center mb-8">
        <svg width="56" height="56" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M 12 4 h 6 a 4 4 0 0 1 4 4 v 14 h 14 a 4 4 0 0 1 4 4 v 6 a 4 4 0 0 1 -4 4 H 12 a 4 4 0 0 1 -4 -4 V 8 a 4 4 0 0 1 4 -4 z"
            fill="#784C14" />
          <rect x="25" y="4" width="7" height="7" rx="1.5" fill="#5AA826" />
          <rect x="34" y="4" width="6" height="7" rx="1.5" fill="#88D040" />
          <rect x="25" y="13" width="15" height="7" rx="1.5" fill="#366D14" />
        </svg>
        <h1 class="text-[22px] font-bold text-[#1B4E3B] mt-3 tracking-tight">Aamar Land</h1>
        <h2 class="text-3xl font-bold text-gray-900 mt-6">Welcome Back</h2>
      </div>

      <form id="login-form" class="space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm font-semibold text-gray-800">Email <span class="text-red-500">*</span></label>
          <input type="email" id="login-email" placeholder="you@example.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 bg-white"
            required>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-semibold text-gray-800">Password <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="password" id="login-password" placeholder="Your password"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 pr-12 bg-white"
              required>
            <button type="button" id="toggle-login-password"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none transition-colors">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pt-2">
          <button type="submit" id="login-submit-btn"
            class="w-full bg-[#1B4E3B] hover:bg-[#133829] text-white font-medium py-3 rounded-xl transition-colors">Log
            In</button>
          <button type="button" id="go-to-signup-btn"
            class="w-full bg-transparent border border-[#1B4E3B] text-[#1B4E3B] hover:bg-green-50/50 font-medium py-3 rounded-xl transition-colors">Sign
            Up</button>
        </div>
      </form>

      <div class="flex items-center gap-4 my-7">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-500 text-sm font-medium">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <button id="google-signin-btn" type="button"
        class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-800 font-semibold py-3 rounded-xl transition-colors disabled:opacity-70">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        <span id="google-btn-text">Sign in with Google</span>
      </button>
    </div>

    <div id="signup-card"
      class="hidden bg-white rounded-[24px] shadow-2xl w-full max-w-[460px] px-8 py-10 sm:px-12 sm:py-12 relative z-10 transition-all duration-300">

      <div class="flex flex-col items-center mb-6">
        <svg width="44" height="44" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M 12 4 h 6 a 4 4 0 0 1 4 4 v 14 h 14 a 4 4 0 0 1 4 4 v 6 a 4 4 0 0 1 -4 4 H 12 a 4 4 0 0 1 -4 -4 V 8 a 4 4 0 0 1 4 -4 z"
            fill="#784C14" />
          <rect x="25" y="4" width="7" height="7" rx="1.5" fill="#5AA826" />
          <rect x="34" y="4" width="6" height="7" rx="1.5" fill="#88D040" />
          <rect x="25" y="13" width="15" height="7" rx="1.5" fill="#366D14" />
        </svg>
        <h2 class="text-2xl font-bold text-gray-900 mt-4">Create Account</h2>
        <p class="text-gray-500 text-sm mt-1">Join Aamar Land ecosystem manually</p>
      </div>

      <form id="signup-form" class="space-y-4">
        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-800">Full Name <span class="text-red-500">*</span></label>
          <input type="text" id="signup-name" placeholder="Your Name"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 bg-white"
            required>
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-800">Email Address <span
              class="text-red-500">*</span></label>
          <input type="email" id="signup-email" placeholder="name@domain.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 bg-white"
            required>
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-800">Phone Number <span
              class="text-red-500">*</span></label>
          <input type="tel" id="signup-phone" placeholder="+880 1XXXX-XXXXXX"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 bg-white"
            required>
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-800">Password <span class="text-red-500">*</span></label>
          <div class="relative">
            <input type="password" id="signup-password" placeholder="Minimum 6 characters"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-xl outline-none focus:border-[#1B4E3B] focus:ring-1 focus:ring-[#1B4E3B] transition-all text-gray-700 pr-12 bg-white"
              required>
            <button type="button" id="toggle-signup-password"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none transition-colors">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="signup-submit-btn"
          class="w-full bg-[#1B4E3B] hover:bg-[#133829] text-white font-semibold py-3 rounded-xl transition-colors mt-2 disabled:opacity-70">
          Register & Create Account
        </button>

        <p class="text-center text-sm text-gray-600 mt-4">
          Already have an account?
          <button type="button" id="back-to-login-btn"
            class="text-[#1B4E3B] font-bold hover:underline focus:outline-none ml-1">Log In</button>
        </p>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ============================================================================
    // SUPABASE CONFIGURATION - PASTE YOUR REAL KEYS HERE
    // ============================================================================
    const SUPABASE_URL = 'https://bycshqlekdibnxsltujl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TiABEf4jCrHOreOFTunaSg_ObakFHbI';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================================
    // PANELS & ROUTING SWITCHES
    // ============================================================================
    const loginCard = document.getElementById('login-card');
    const signupCard = document.getElementById('signup-card');

    document.getElementById('go-to-signup-btn').addEventListener('click', () => {
      loginCard.classList.add('hidden');
      signupCard.classList.remove('hidden');
    });

    document.getElementById('back-to-login-btn').addEventListener('click', () => {
      signupCard.classList.add('hidden');
      loginCard.classList.remove('hidden');
    });

    // ============================================================================
    // ICON SVGS & VISIBILITY TOGGLE
    // ============================================================================
    const eyeIconOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeIconClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`;

    const setupPasswordToggle = (inputFieldId, toggleButtonId) => {
      const input = document.getElementById(inputFieldId);
      const button = document.getElementById(toggleButtonId);
      let isVisible = false;
      button.addEventListener('click', () => {
        isVisible = !isVisible;
        input.type = isVisible ? "text" : "password";
        button.innerHTML = isVisible ? eyeIconClosed : eyeIconOpen;
      });
    };

    setupPasswordToggle('login-password', 'toggle-login-password');
    setupPasswordToggle('signup-password', 'toggle-signup-password');

    // ============================================================================
    // SUPABASE MANUAL REGISTRATION
    // ============================================================================
    const signupForm = document.getElementById('signup-form');
    const signupSubmitBtn = document.getElementById('signup-submit-btn');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const phone = document.getElementById('signup-phone').value;
      const password = document.getElementById('signup-password').value;

      try {
        signupSubmitBtn.disabled = true;
        signupSubmitBtn.textContent = 'Creating Account...';

        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { full_name: name, phone_number: phone }
          }
        });

        if (error) throw error;
        alert('Account created! You can now log in.');
        signupForm.reset();
        signupCard.classList.add('hidden');
        loginCard.classList.remove('hidden');
      } catch (error) {
        alert('Signup Failed: ' + error.message);
      } finally {
        signupSubmitBtn.disabled = false;
        signupSubmitBtn.textContent = 'Register & Create Account';
      }
    });

    // ============================================================================
    // STANDARD EMAIL LOGIN HANDLER
    // ============================================================================
    const loginForm = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-submit-btn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } catch (error) {
        alert('Login Error: ' + error.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });

    // ============================================================================
    // GOOGLE OAUTH
    // ============================================================================
    const googleSignInBtn = document.getElementById('google-signin-btn');
    const googleBtnText = document.getElementById('google-btn-text');

    googleSignInBtn.addEventListener('click', async () => {
      try {
        googleSignInBtn.disabled = true;
        googleBtnText.textContent = 'Redirecting to Google...';

        // This command tells Supabase to send the user to the Google Login screen
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            // This is where Google sends you back AFTER logging in
            redirectTo: window.location.href
          }
        });
        if (error) throw error;
      } catch (error) {
        alert('Failed Google Link: ' + error.message);
        googleSignInBtn.disabled = false;
        googleBtnText.textContent = 'Sign in with Google';
      }
    });

    // ============================================================================
    // AUTHENTICATION STATE LISTENER (DETECTS SUCCESSFUL LOGIN)
    // ============================================================================
    // This constantly listens to see if the user is logged in. 
    // When Google redirects you back, this code catches the success!
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {

        // Redirect the user to the home page directly
        window.location.href = 'index.html';
      }
    });
  </script>
</body>

</html>
